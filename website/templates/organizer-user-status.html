{% extends "base.html" %}

{% block title %}Organizer Dashboard{% endblock %}

{% block content %}
<style>
  .organizer-users-page #user-container {
    overflow-x: auto;
  }

  .organizer-users-page #user-container table {
    min-width: 850px;
  }
</style>

<div class="container-fluid py-2 py-md-4 organizer-users-page">

  <!-- Page Header -->
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-2">
    <h2 class="mb-0">Attendees List</h2>

    <!-- Attendee Tools -->
    <div class="d-flex flex-column flex-md-row gap-2">
      <a id="export-roommate-prefs-btn" class="btn btn-outline-primary d-flex align-items-center gap-2 w-100 w-md-auto" href="/api/v1/users/roommate-preferences/export.csv">
        <img class="icon-img" src="{{ url_for('static', filename='icons/download.svg') }}" alt="" aria-hidden="true" style="height: 1rem; width: auto;"> Export Roommate Prefs CSV
      </a>

      <button id="copy-incomplete-status-btn" class="btn btn-outline-secondary d-flex align-items-center gap-2 w-100 w-md-auto" type="button">
        <img class="icon-img" src="{{ url_for('static', filename='icons/attendees.svg') }}" alt="" aria-hidden="true" style="height: 1rem; width: auto;"> Copy Incomplete Emails
      </button>
    </div>
  </div>

  <!-- DataTable Container -->
  <div id="user-container" class="card p-3 shadow-sm table-responsive">
    <div class="text-center py-3 py-md-5 text-muted">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-3">Loading users...</p>
    </div>
  </div>

</div>

{% include "edit_user_modal.html" %}
{% endblock %}

{% block scripts %}
  {{ super() }}

  <!-- jQuery & DataTables -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/2.1.8/js/dataTables.min.js"></script>
  <link rel="stylesheet" href="https://cdn.datatables.net/2.1.8/css/dataTables.dataTables.min.css">

  <!-- Custom JS -->
  <script src="{{ url_for('static', filename='js/edit-modal.js') }}"></script>
  <script src="{{ url_for('static', filename='js/user-status.js') }}"></script>
{% endblock %}
