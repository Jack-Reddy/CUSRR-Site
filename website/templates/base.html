<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="apple-touch-icon" sizes="76x76" href="{{ url_for('static', filename='assets/img/apple-icon.png') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/img/favicon.png') }}">
  <title>{% block title %}CUSRR{% endblock %}</title>

  <!-- Fonts and icons -->
  <link href="https://fonts.googleapis.com/css?family=Poppins:400,500,600,700&display=swap" rel="stylesheet" />
  <link href="{{ url_for('static', filename='assets/css/nucleo-icons.css') }}" rel="stylesheet" />
  <link href="{{ url_for('static', filename='assets/css/nucleo-svg.css') }}" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
  <link id="pagestyle" href="{{ url_for('static', filename='assets/css/soft-design-system.css') }}" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
  <!-- Sidebar -->
  {% include "sidebar.html" %}

  <!-- Mobile sidebar toggle -->
  <button class="btn btn-primary d-lg-none sidebar-toggle-mobile" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidenav-main" aria-controls="sidenav-main">
    <i class="fas fa-bars"></i>
  </button>

  <!-- Main content wrapper -->
  <main class="main-content bg-gradient-light">

    <!-- Top auth controls -->
    <div class="auth-controls position-absolute top-0 end-0 p-3" style="z-index: 1100;">
      <a id="login-btn" class="btn btn-sm btn-primary" href="/google/login">Login</a>
      <div id="logout-btn" class="dropdown" style="display:none;">
        <button class="btn btn-sm btn-outline-primary dropdown-toggle d-flex align-items-center gap-2" data-bs-toggle="dropdown" aria-expanded="false">
          <img id="user-pic" src="" alt="" class="rounded-circle" style="width:24px;height:24px;display:none;">
          <span id="user-name"></span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><a class="dropdown-item" href="/profile">Profile</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item" href="/google/logout">Logout</a></li>
        </ul>
      </div>
    </div>

    {% block content %}{% endblock %}
  </main>


  <!-- Shared session modal -->
  <div class="modal fade" id="sessionModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
      <div class="modal-content session-modal rounded-4 border-0 shadow-lg">
        <div class="modal-body p-0">

          <!-- HERO -->
          <div class="session-hero position-relative rounded-top-4 p-3 p-md-4">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <div class="session-time" id="mTime"></div>
                <div class="session-room text-secondary" id="mRoom"></div>
              </div>
            </div>
            <div class="d-flex gap-3 align-items-center mt-3">
              <div class="flex-grow-1">
                <div class="badge bg-dark text-white mb-2" id="mProgramId"></div>
                <h5 class="mb-1 session-title" id="mTitle"></h5>
                <div class="text-secondary session-authors" id="mAuthors"></div>
              </div>
            </div>
          </div>


          <!-- BODY -->
          <div class="p-4 session-body">
            <p><strong>Subject:</strong> <span id="mSubject"></span></p>
            <p><strong>Type:</strong> <span id="mType"></span></p>
            <p><strong>Presenters:</strong> <span id="mPresenters"></span></p>
            <div class="mb-0 session-abstract" id="mAbstract"></div>
          </div>


        </div>
      </div>
    </div>
  </div>

  <!-- Auth helper -->
  <script>
    (async function(){
      try {
        const resp = await fetch('/me', { credentials: 'same-origin' });
        if (!resp.ok) {
          document.getElementById('login-btn').style.display = '';
          document.getElementById('logout-btn').style.display = 'none';
          document.getElementById('user-name').textContent = '';
          const img = document.getElementById('user-pic');
          img.style.display = 'none';
          img.src = '';
          return;
        }
        const data = await resp.json();
        if (data && data.authenticated) {
          document.getElementById('login-btn').style.display = 'none';
          document.getElementById('logout-btn').style.display = '';
          document.getElementById('user-name').textContent = data.name || data.email || '';
          const img = document.getElementById('user-pic');
          if (data.picture) { img.src = data.picture; img.style.display = ''; }
          else { img.style.display = 'none'; img.src = ''; }
        } else {
          document.getElementById('login-btn').style.display = '';
          document.getElementById('logout-btn').style.display = 'none';
        }
      } catch (e) {
        console.error('auth helper error', e);
        document.getElementById('login-btn').style.display = '';
        document.getElementById('logout-btn').style.display = 'none';
      }
    })();
  </script>


  <!-- Core JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='assets/js/soft-design-system.min.js') }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script>
    window.MathJax = {
      tex: {
        packages: { '[+]': ['ams', 'noerrors', 'noundefined'] },
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script src="{{ url_for('static', filename='js/abstract-markdown.js') }}"></script>

  <!-- Shared session modal JS -->
  <script src="{{ url_for('static', filename='js/session-modal.js') }}"></script>

  <!-- Grading modal -->
  <div class="modal fade" id="gradeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4 border-0 shadow-lg">
        <div class="modal-header">
          <h5 class="modal-title">Grade Presentation: <span id="gPresentationTitle"></span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form>
            <input type="hidden" id="gPresentationId" name="presentation_id" />
            <div class="mb-3">
              <label class="form-label review-app__label review-app__row">
                <span>Originality </span><span id="gScoreOrigVal">2</span>
              </label>
              <input type="range" class="review-app__range crit" min="0" max="3" value="2" id="gScoreOrig">
            </div>
            <div class="mb-3">
              <label class="form-label review-app__label review-app__row">
                <span>Clarity </span><span id="gScoreClarVal">2</span>
              </label>
              <input type="range" class="review-app__range crit" min="0" max="3" value="2" id="gScoreClar">
            </div>
            <div class="mb-3">
              <label class="form-label review-app__label review-app__row">
                <span>Significance </span><span id="gScoreSignVal">2</span>
              </label>
              <input type="range" class="review-app__range crit" min="0" max="3" value="2" id="gScoreSign">
            </div>

            <div class="review-app__total mb-3 d-flex justify-content-between align-items-center">
              <div class="review-app__total-label">Total</div>
              <div class="review-app__total-value" id="gScoreTotal">6</div>
            </div>

            <div class="mb-3">
              <label class="form-label">Comments (optional)</label>
              <textarea id="gComments" class="form-control" rows="3"></textarea>
            </div>
            <div class="d-flex justify-content-end">
              <button type="submit" class="btn btn-primary">Submit Grade</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Page-specific JS -->
  {% block scripts %}{% endblock %}
</body>
</html>
