{% extends "base.html" %}

{% block title %}Schedule{% endblock %}

{% block content %}
<div class="row g-4">
  <div class="col-12">
    <!-- Day Selector -->
    <div class="mb-3">
      <label for="day-select" class="form-label fw-bold">Select Day</label>
      <div class="d-flex flex-column flex-sm-row gap-2">
        <select id="day-select" class="form-select">
          <option>Loading...</option>
        </select>
        {% if is_organizer %}
        <button id="save-order-btn" class="btn btn-primary flex-shrink-0">Save Order</button>
        {% endif %}
      </div>
    </div>

    <!-- Top: Overview -->
    <div class="row g-3 mb-4" id="schedule-overview"></div>

    <!-- Bottom: Full Details -->
    <div id="schedule-details" class="vstack gap-3"></div>

    <!-- Add new Schedule Block -->
    {% if is_organizer %}
    <div class="d-flex justify-content-end mt-4">
      <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#editBlockModal" id="add-block-btn">
        <i class="fas fa-plus me-2"></i>Add Schedule Block
      </button>
    </div>
    {% endif %}
  </div>
</div>

{% include 'edit_block_modal.html' %}

{% endblock %}

{% block scripts %}
{{ super() }}

{% if is_organizer %}
<!-- SortableJS only for organizers -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script>
  // Expose organizer flag to client-side scripts
  window.IS_ORGANIZER = 'true';
</script>
{% endif %}

<!-- Your dynamic schedule logic -->
<script src="{{ url_for('static', filename='js/schedule.js') }}"></script>
<script src="{{url_for('static', filename='js/edit-block-modal.js')}}"></script>

{% endblock %}
