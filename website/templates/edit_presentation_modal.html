<div class="modal fade" id="editPresentationModal" tabindex="-1" aria-labelledby="editPresentationModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <form id="editPresentationForm">
        <!-- Hidden presentation id to make updates explicit -->
        <input type="hidden" id="editPresentationId" name="presentation_id">

        <div class="modal-header">
          <h5 class="modal-title" id="editPresentationModalLabel">Edit Presentation</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body">

          <div class="row g-3">

            <!-- Title -->
            <div class="col-12">
              <label for="editPresentationTitle" class="form-label fw-semibold">Title</label>
              <input type="text" id="editPresentationTitle" name="title" class="form-control" required>
            </div>

            <!-- Abstract -->
            <div class="col-12">
              <label for="editPresentationAbstract" class="form-label fw-semibold">Abstract</label>
              <textarea id="editPresentationAbstract" name="abstract" rows="5" class="form-control"></textarea>
            </div>

            <!-- Subject -->
            <div class="col-12">
              <label for="editPresentationSubject" class="form-label fw-semibold">Subject</label>
              <input type="text" id="editPresentationSubject" name="subject" class="form-control">
            </div>

            <!-- Presentation Type -->
            <div class="col-12">
              <label for="editPresentationType" class="form-label fw-semibold">Presentation Type</label>
              <select id="editPresentationType" name="type" class="form-select">
                <option value="Presentation">Presentation</option>
                <option value="Blitz">Blitz</option>
                <option value="Poster">Poster</option>
              </select>
              <div class="form-text">This controls whether the item appears as a presentation, blitz, or poster.</div>
            </div>

            <!-- Schedule Block -->
            <div class="col-12">
              <label for="editPresentationSchedule" class="form-label fw-semibold">Schedule Block</label>
              <select id="editPresentationSchedule" name="schedule_id" class="form-select">
                <option value="">Unassigned</option>
              </select>
              <div class="form-text">Use this to move the presentation to another schedule block.</div>
            </div>

            <div class="col-12">
              <div class="form-check mt-1">
                <input type="checkbox" id="editPresentationShowOnSchedule" name="show_on_schedule" class="form-check-input" value="true">
                <label class="form-check-label fw-semibold" for="editPresentationShowOnSchedule">
                  Show this presentation on schedule and program pages
                </label>
              </div>
            </div>

          </div>

        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>

      </form>

    </div>
  </div>
</div>
