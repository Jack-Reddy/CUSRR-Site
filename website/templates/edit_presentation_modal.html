<div class="modal fade" id="editPresentationModal" tabindex="-1" aria-labelledby="editPresentationModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <form id="editPresentationForm">
        <!-- Hidden presentation id to make updates explicit -->
        <input type="hidden" id="editPresentationId" name="presentation_id">

        <div class="modal-header">
          <h5 class="modal-title" id="editPresentationModalLabel">Edit Presentation</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body">

          <div class="row g-3">

            <!-- Title -->
            <div class="col-12">
              <label for="editPresentationTitle" class="form-label fw-semibold">Title</label>
              <input type="text" id="editPresentationTitle" name="title" class="form-control" required>
            </div>

            <!-- Abstract -->
            <div class="col-12">
              <label for="editPresentationAbstract" class="form-label fw-semibold">Abstract</label>
              <textarea id="editPresentationAbstract" name="abstract" rows="5" class="form-control"></textarea>
            </div>

            <!-- Department -->
            <div class="col-12 col-md-6">
              <label for="editPresentationDepartment" class="form-label fw-semibold">Department</label>
              <input type="text" id="editPresentationDepartment" name="department" class="form-control">
            </div>

            <!-- Mentor -->
            <div class="col-12 col-md-6">
              <label for="editPresentationMentor" class="form-label fw-semibold">Mentor</label>
              <input type="text" id="editPresentationMentor" name="mentor" class="form-control">
            </div>

            <!-- Keywords -->
            <div class="col-12">
              <label for="editPresentationKeywords" class="form-label fw-semibold">Keywords</label>
              <input type="text" id="editPresentationKeywords" name="keywords" class="form-control">
            </div>

            <div class="col-12">
              <div class="form-check mt-1">
                <input type="checkbox" id="editPresentationShowOnSchedule" name="show_on_schedule" class="form-check-input" value="true">
                <label class="form-check-label fw-semibold" for="editPresentationShowOnSchedule">
                  Show this presentation on schedule and program pages
                </label>
              </div>
            </div>

          </div>

        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>

      </form>

    </div>
  </div>
</div>
