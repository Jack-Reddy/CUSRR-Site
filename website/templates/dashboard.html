{% extends "base.html" %}
{% block title %}General Dashboard{% endblock %}

{% block content %}

<h3 class="mb-3">Program</h3>

<section class="mb-4">
  <div class="d-flex align-items-center justify-content-between mb-2">
    <h5 class="mb-0">Quick View</h5>
    <a href="{{ url_for('presentation_overview.download_overview_pdf') }}" class="btn btn-sm btn-outline-primary">
      Download Program PDF
    </a>
  </div>
  <div class="table-responsive">
    <table class="table table-sm table-bordered align-middle mb-0" id="program-quick-view-table">
      <thead class="table-light">
        <tr>
          <th>Time</th>
          <th>ID</th>
          <th>Student Author(s)</th>
          <th>Title</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="4" class="text-muted">Loading program...</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

<section class="program-cards">
  <div class="hscroll-mask">
    <div class="row g-4 row-cols-1 row-cols-sm-2 row-cols-lg-3 scroll-row">

      <!-- Blitz Card -->
      <div class="col">
        <a href="{{ url_for('blitz_page') }}" class="card-link-wrapper">
          <div class="card card-plain card-blog h-100">
            <div class="card-image border-radius-lg position-relative overflow-hidden">
              <img
                class="w-100 h-100 border-radius-lg move-on-hover shadow"
                src="{{ url_for('static', filename='blitz.png') }}"
              />
              <div class="card-overlay">
                <h5 class="overlay-title">Blitz</h5>
              </div>
            </div>
          </div>
        </a>
      </div>

      <!-- Presentation Card -->
      <div class="col">
        <a href="{{ url_for('presentation_page') }}" class="card-link-wrapper">
          <div class="card card-plain card-blog h-100">
            <div class="card-image border-radius-lg position-relative overflow-hidden">
              <img
                class="w-100 border-radius-lg move-on-hover shadow"
                src="{{ url_for('static', filename='pres.jpeg') }}"
              />
              <div class="card-overlay">
                <h5 class="overlay-title">Presentation</h5>
              </div>
            </div>
          </div>
        </a>
      </div>

      <!-- Poster Card -->
      <div class="col">
        <a href="{{ url_for('poster_page') }}" class="card-link-wrapper">
          <div class="card card-plain card-blog h-100">
            <div class="card-image border-radius-lg position-relative overflow-hidden">
              <img
                class="w-100 border-radius-lg move-on-hover shadow"
                src="{{ url_for('static', filename='poster.jpg') }}"
              />
              <div class="card-overlay">
                <h5 class="overlay-title">Poster</h5>
              </div>
            </div>
          </div>
        </a>
      </div>

    </div>
  </div>
</section>

<h3 class="mt-5 mb-3 d-flex align-items-center justify-content-between">
  <span>Upcoming</span>
</h3>

<div id="upcoming-container" class="vstack gap-3"></div>

{% endblock %}

{% block scripts %}
{{ super() }}

<script src="{{ url_for('static', filename='js/session-modal.js') }}"></script>

<script>
function escapeProgramQuickView(value) {
  return String(value ?? '').replace(/[&<>"']/g, (char) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  }[char]));
}

function renderProgramQuickView(rows) {
  const tbody = document.querySelector('#program-quick-view-table tbody');
  if (!tbody) return;

  if (!rows || rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="text-muted">No program items available.</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map((row) => {
    const isMeal = row.kind === 'event' && ['lunch', 'dinner'].includes(row.event_type);
    const authorClass = isMeal ? 'table-primary fw-semibold text-capitalize' : '';
    return `
      <tr>
        <td>${escapeProgramQuickView(row.time || '-')}</td>
        <td>${escapeProgramQuickView(row.id || '')}</td>
        <td class="${authorClass}">${escapeProgramQuickView(row.authors || '-')}</td>
        <td>${escapeProgramQuickView(row.title || '-')}</td>
      </tr>
    `;
  }).join('');
}

document.addEventListener('DOMContentLoaded', () => {
  fetch('/api/v1/presentations/program-table')
    .then((response) => {
      if (!response.ok) throw new Error(`Failed to load program table: ${response.status}`);
      return response.json();
    })
    .then(renderProgramQuickView)
    .catch((err) => {
      console.error(err);
      const tbody = document.querySelector('#program-quick-view-table tbody');
      if (tbody) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-danger">Could not load program quick view.</td></tr>';
      }
    });

  // Load only upcoming presentations
  SessionModal.loadSessions('/api/v1/presentations/recent', '#upcoming-container', 'session-card', 5);

  // Enable modal clicks
  SessionModal.setupDelegatedClicks('#upcoming-container');
});
</script>

{% endblock %}
