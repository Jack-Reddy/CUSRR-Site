{% extends "base.html" %}

{% block title %}Presentation Dashboard{% endblock %}

{% block content %}
<style>
  .organizer-presentations-page #presentation-table select.form-select-sm {
    min-width: 9rem;
    max-width: 100%;
    padding-right: 2.25rem !important;
    background-position: right .65rem center;
    background-size: 16px 12px;
    text-overflow: ellipsis;
  }

  .organizer-presentations-page #presentation-table select[aria-label="Update schedule block"] {
    min-width: 18rem;
  }
</style>

<div class="container-fluid py-2 py-md-4 organizer-presentations-page">

  <!-- Page Header -->
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-2 gap-2">
    <h2 class="mb-0">Presentations Dashboard</h2>
    <button id="download-presentations" class="btn btn-primary">
      Download All Presentations
    </button>
  </div>

  <!-- DataTable Container -->
  <div id="presentation-container" class="card p-3 shadow-sm">
    <div class="text-center py-3 py-md-5 text-muted">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-3">Loading presentations...</p>
    </div>
  </div>

</div>

{% include "edit_presentation_modal.html" %}
{% endblock %}

{% block scripts %}
  {{ super() }}

  <!-- jQuery & DataTables -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/2.1.8/js/dataTables.min.js"></script>
  <link rel="stylesheet"
        href="https://cdn.datatables.net/2.1.8/css/dataTables.dataTables.min.css">

  <!-- Custom JS -->
  <script src="{{ url_for('static', filename='js/edit-presentation-modal.js') }}"></script>
  <script src="{{ url_for('static', filename='js/presentation-status.js') }}"></script>
{% endblock %}
